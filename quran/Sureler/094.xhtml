    <div>

      <h2 class="surah_name">سُورَةُ الشَّرۡحِ</h2>
      <p class="bismillah">
بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ
</p>
      <p class="quran">
<span>أَلَمۡ نَشۡرَحۡ لَكَ صَدۡرَكَ ١</span>
<span>وَوَضَعۡنَا عَنكَ وِزۡرَكَ ٢</span>
<span>ٱلَّذِيٓ أَنقَضَ ظَهۡرَكَ ٣</span>
<span>وَرَفَعۡنَا لَكَ ذِكۡرَكَ ٤</span>
<span>فَإِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرًا ٥</span>
<span>إِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا ٦</span>
<span>فَإِذَا فَرَغۡتَ فَٱنصَبۡ ٧</span>
<span>وَإِلَىٰ رَبِّكَ فَٱرۡغَب ٨</span>
</p>
