    <div>

      <h2 class="surah_name">سُورَةُ المَسَدِ</h2>
      <p class="bismillah">
بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ
</p>
      <p class="quran">
<span>تَبَّتۡ يَدَآ أَبِي لَهَبٖ وَتَبَّ ١</span>
<span>مَآ أَغۡنَىٰ عَنۡهُ مَالُهُۥ وَمَا كَسَبَ ٢</span>
<span>سَيَصۡلَىٰ نَارٗا ذَاتَ لَهَبٖ ٣</span>
<span>وَٱمۡرَأَتُهُۥ حَمَّالَةَ ٱلۡحَطَبِ ٤</span>
<span>فِي جِيدِهَا حَبۡلٞ مِّن مَّسَدِۭ ٥</span>
</p>
