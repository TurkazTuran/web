      <h2 class="surah_name">سُورَةُ الفَلَقِ</h2>
      <p class="bismillah">
بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ
</p>
      <p class="quran">
<span>قُلۡ أَعُوذُ بِرَبِّ ٱلۡفَلَقِ ١</span>
<span>مِن شَرِّ مَا خَلَقَ ٢</span>
<span>وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ٣</span>
<span>وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِي ٱلۡعُقَدِ ٤</span>
<span>وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ ٥</span>
</p>
