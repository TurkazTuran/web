<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Responsive font sizing using clamp for better readability */
        body {
            font-size: clamp(1rem, 2vw + 1rem, 1.5rem);
            line-height: 1.6; /* Slightly increasing line-height */
        }
        /* Adjust list item padding and counter size on small screens */
        ul,
        ol {
            padding-left: 1.5em;
        }
        li {
            padding: 0.5rem 0; /* Adjust padding for list items */
            font-size: clamp(1rem, 2vw + 1rem, 1.3rem); /* Responsive font sizing for list items */
        }

        /* Improve touch targets for phones */
        button, a {
            padding: 12px 16px; /* Increase padding for touch targets */
            font-size: clamp(1rem, 2vw + 1rem, 1.5rem);
            line-height: 1.5;
        }
    </style>
    <title>The Quran</title>
</head>
<body>
    <h1>The Holy Quran</h1>
    <p>Welcome to the online representation of the Quran. This interface is optimized for mobile readability.</p>
    <ul>
        <li>Introduction</li>
        <li>The message of the Quran</li>
        <li>Chapters</li>
    </ul>
</body>
</html>
