<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22 width=%2264%22 height=%2264%22><rect x=%228%22 y=%228%22 width=%2248%22 height=%2248%22 rx=%224%22 fill=%22%23ffffff%22 stroke=%22%23d0d0d0%22 stroke-width=%222%22/><line x1=%2216%22 y1=%2220%22 x2=%2248%22 y2=%2220%22 stroke=%22%23a0a0a0%22 stroke-width=%222%22 stroke-linecap=%22round%22/><line x1=%2216%22 y1=%2230%22 x2=%2248%22 y2=%2230%22 stroke=%22%23a0a0a0%22 stroke-width=%222%22 stroke-linecap=%22round%22/><line x1=%2216%22 y1=%2240%22 x2=%2236%22 y2=%2240%22 stroke=%22%23a0a0a0%22 stroke-width=%222%22 stroke-linecap=%22round%22/></svg>">
	<title>Prüfvermerk Generator</title>

	<style>
		:root {
			--bg: #e8e8e8;
			--surface: #f5f5f5;
			--border: #c0c0c0;
			--text: #000000;
			--muted: #666666;
			--accent: #0066cc;
			--danger: #cc0000;
			--header-bg: #d4d4d4;
			--bar-size: 6px;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 20px;
			font-family: Arial, sans-serif;
			background: var(--bg);
			color: var(--text);
			font-size: 14px;
		}

		.app-shell {
			max-width: 1400px;
			margin: 0 auto;
		}

		h2 {
			margin: 0 0 20px;
			font-size: 16px;
			font-weight: 600;
			color: var(--text);
		}

		button,
		input,
		select,
		textarea {
			font: inherit;
			padding: 6px 10px;
			border-radius: 3px;
			border: 1px solid var(--border);
			background: #fff;
			color: var(--text);
		}

		input::placeholder,
		textarea::placeholder {
			color: var(--muted);
		}

		input:focus,
		select:focus,
		textarea:focus,
		button:focus {
			border-color: var(--accent);
			outline: none;
		}

		button {
			cursor: pointer;
			background: #e0e0e0;
			color: var(--text);
			font-weight: normal;
			border: 1px solid var(--border);
		}

		button:hover {
			background: #d0d0d0;
		}

		button.primary {
			background: var(--accent);
			color: #fff;
			border: 1px solid #0052a3;
		}

		button.primary:hover {
			background: #004f9e;
		}

		button.delete {
			background: #eeeeee;
			border: 1px solid #d2d2d2;
			color: var(--danger);
			font-weight: 700;
			padding: 2px 8px;
			font-size: 14px;
			min-width: 34px;
		}

		button.delete:hover {
			background: #ffdede;
		}

		button.edit {
			background: #eeeeee;
			border: 1px solid #d2d2d2;
			color: #333;
			font-weight: 700;
			padding: 2px 8px;
			font-size: 13px;
			min-width: 34px;
		}

		button.edit:hover {
			background: #dcecff;
			color: var(--accent);
		}

		.tabs {
			display: flex;
			gap: 4px;
			margin-bottom: 15px;
		}

		.tab-btn {
			background: #e0e0e0;
			border: 1px solid var(--border);
			padding: 8px 16px;
			font-size: 14px;
		}

		.tab-btn.active {
			background: var(--accent);
			color: #fff;
			border-color: var(--accent);
		}

		.view {
			display: none;
		}

		.view.active {
			display: block;
		}

		.bulk-panel {
			display: grid;
			gap: 8px;
			margin-bottom: 15px;
			padding: 10px;
			background: var(--surface);
			border: 1px solid var(--border);
		}

		.bulk-actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.section-grid {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 12px;
		}

		.section {
			background: var(--surface);
			border: 1px solid var(--border);
			overflow: visible;
		}

		.section-title {
			font-weight: 600;
			font-size: 12px;
			padding: 6px 10px;
			background: var(--header-bg);
			border-bottom: 1px solid var(--border);
			color: var(--text);
		}

		.section-body {
			padding: 8px;
			display: grid;
			gap: 8px;
			position: relative;
		}

		.summary {
			margin-top: 15px;
			background: var(--surface);
			border: 1px solid var(--border);
			padding: 12px;
		}

		.summary h3 {
			margin: 0 0 8px;
			font-size: 15px;
			font-weight: 600;
			color: var(--text);
		}

		.summary-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
		}

		.summary-col textarea {
			min-height: 160px;
		}

		textarea {
			width: 100%;
			min-height: 80px;
			resize: vertical;
			font-size: 14px;
			font-family: Arial, sans-serif;
			padding: 8px;
		}

		.custom-dropdown {
			position: relative;
		}

		.dropdown-trigger {
			width: 100%;
			text-align: left;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
			border-left: var(--bar-size) solid #6f6f6f;
			min-height: 36px;
		}

		.dropdown-trigger-text {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.dropdown-trigger-arrow {
			flex: 0 0 auto;
			color: #555;
			font-size: 12px;
		}

		.dropdown-menu {
			display: none;
			position: absolute;
			top: calc(100% + 2px);
			left: 0;
			right: 0;
			background: #fff;
			border: 1px solid var(--border);
			box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
			z-index: 2000;
			max-height: 260px;
			overflow-y: auto;
		}

		.custom-dropdown.open .dropdown-menu {
			display: block;
		}

		.dropdown-empty {
			padding: 10px;
			color: var(--muted);
			font-size: 12px;
		}

		.dropdown-item {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
			align-items: center;
			padding: 6px 8px;
			border-bottom: 1px solid #ececec;
		}

		.dropdown-item.no-actions {
			grid-template-columns: 1fr;
		}

		.dropdown-item:last-child {
			border-bottom: none;
		}

		.dropdown-item.selected {
			background: rgba(0, 102, 204, 0.08);
		}

		.dropdown-label {
			min-width: 0;
			padding: 6px 8px;
			border-left: var(--bar-size) solid #8a8a8a;
			background: #fafafa;
			cursor: pointer;
			font-size: 12px;
			word-break: break-word;
		}

		.dropdown-label:hover {
			background: #eef5ff;
		}

		.dropdown-actions {
			display: flex;
			gap: 4px;
			align-items: center;
		}

		/* Auswahlliste größer */
		#selectView .section-title {
			font-size: 16px;
			padding: 10px 12px;
		}

		#selectView .dropdown-trigger,
		#selectView .dropdown-label,
		#selectView .section-body input[data-manual-cat] {
			font-size: 15px;
		}

		#bulkCategorySelector,
		#bulkInput,
		#selectedText,
		#manualText {
			font-size: 15px;
		}

		.splash-message {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: rgba(0, 0, 0, 0.85);
			color: white;
			padding: 20px 40px;
			border-radius: 12px;
			font-family: sans-serif;
			font-size: 1.2rem;
			z-index: 10000;
			pointer-events: none;
			transition: opacity 0.5s ease;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
		}

		.splash-message.fade-out {
			opacity: 0;
		}

		@media (max-width: 1100px) {
			.section-grid {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}
		}

		@media (max-width: 700px) {
			.section-grid,
			.summary-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<div class="app-shell">
		<h2>Prüfvermerk Generator</h2>

		<div class="tabs">
			<button class="tab-btn active" onclick="showView('inputView', this)">Werte eingeben</button>
			<button class="tab-btn" onclick="showView('selectView', this)">Auswahlliste</button>
		</div>

		<div id="inputView" class="view active">
			<div class="bulk-panel">
				<textarea id="bulkInput" rows="3" placeholder="Mehrere Zeilen einfügen (jede Zeile = Checkbox)"></textarea>
				<div class="bulk-actions">
					<select id="bulkCategorySelector"></select>
					<button class="primary" onclick="addBulkItems()">Werte hinzufügen</button>
				</div>
			</div>

			<div id="inputListGrid" class="section-grid"></div>
		</div>

		<div id="selectView" class="view">
			<div class="section-grid" id="selectGrid"></div>

			<div class="summary">
				<div class="summary-grid">
					<div class="summary-col">
						<h3>Ausgewählte Werte</h3>
						<textarea id="selectedText" readonly></textarea>
					</div>
					<div class="summary-col">
						<h3>Manuelle Ergänzung</h3>
						<textarea id="manualText" placeholder="Zusätzliche eigene Texte..."></textarea>
					</div>
				</div>

				<div style="margin-top:10px; display:flex; gap:8px;">
					<button class="primary" onclick="copySummary()">Texte kopieren</button>
					<button onclick="resetSummary()">Zurücksetzen</button>
				</div>
			</div>
		</div>
	</div>

	<script>
		const categories = [
			"Aktueller Status",
			"Beantragt",
			"Zeitliche Voraussetzung",
			"Lebensunterhalt",
			"Rentenversicherung",
			"Sicherheit",
			"Sprachkenntnisse",
			"Rechts- und Gesellschaftsordnung",
			"Erteilung"
		];

		let data = JSON.parse(localStorage.getItem("checklistData")) || {};
		categories.forEach(c => data[c] ||= []);

		const bulkInput = document.getElementById("bulkInput");
		const bulkCategorySelector = document.getElementById("bulkCategorySelector");
		const inputListGrid = document.getElementById("inputListGrid");
		const selectGrid = document.getElementById("selectGrid");
		const selectedText = document.getElementById("selectedText");
		const manualText = document.getElementById("manualText");

		function showView(id, btn) {
			document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
			document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
			document.getElementById(id).classList.add("active");
			btn.classList.add("active");

			closeAllDropdowns();

			if (id === "inputView") renderInputView();
			if (id === "selectView") renderSelectView();
		}

		function renderCategorySelector() {
			bulkCategorySelector.innerHTML = '<option value="">Kategorie auswählen</option>';
			categories.forEach(cat => {
				const o = document.createElement("option");
				o.value = cat;
				o.textContent = cat;
				bulkCategorySelector.appendChild(o);
			});
		}

		function renderInputView() {
			inputListGrid.innerHTML = "";

			categories.forEach(cat => {
				const sec = document.createElement("div");
				sec.className = "section";

				sec.innerHTML = `
					<div class="section-title">${escapeHtml(cat)}</div>
					<div class="section-body">
						${renderCustomDropdown(cat, "input")}
					</div>
				`;

				inputListGrid.appendChild(sec);
			});
		}

		function renderSelectView() {
			selectGrid.innerHTML = "";

			categories.forEach(cat => {
				const sec = document.createElement("div");
				sec.className = "section";

				sec.innerHTML = `
					<div class="section-title">${escapeHtml(cat)}</div>
					<div class="section-body">
						${renderCustomDropdown(cat, "select")}
						<input
							type="text"
							placeholder="Manuelle Ergänzung für ${escapeHtml(cat)}..."
							data-manual-cat="${cssId(cat)}"
							value="${escapeAttribute(getManualCategoryText(cat))}"
							oninput="setManualCategoryText('${escapeJs(cat)}', this.value); updateSummary();">
					</div>
				`;

				selectGrid.appendChild(sec);
			});

			updateSummary();
		}

		function renderCustomDropdown(category, mode) {
			const selectedIndex = mode === "input" ? getSelectedIndex(category) : getSelectChoice(category);
			const selectedValue = selectedIndex !== '' && data[category][selectedIndex]
				? data[category][selectedIndex]
				: "Bitte auswählen";

			const withActions = mode === "input";

			return `
				<div class="custom-dropdown" data-category="${escapeAttribute(category)}" data-mode="${mode}">
					<button type="button" class="dropdown-trigger" onclick="toggleDropdown(this)">
						<span class="dropdown-trigger-text">${escapeHtml(selectedValue)}</span>
						<span class="dropdown-trigger-arrow">▼</span>
					</button>
					<div class="dropdown-menu">
						${data[category].length ? data[category].map((value, index) => `
							<div class="dropdown-item ${String(selectedIndex) === String(index) ? 'selected' : ''} ${withActions ? '' : 'no-actions'}">
								<div class="dropdown-label"
									onclick="selectDropdownItem('${escapeJs(category)}', ${index}, '${mode}')">
									${escapeHtml(value)}
								</div>
								${withActions ? `
									<div class="dropdown-actions">
										<button type="button" class="edit"
											onclick="event.stopPropagation(); editItemFromDropdown('${escapeJs(category)}', ${index}, '${mode}')">✎</button>
										<button type="button" class="delete"
											onclick="event.stopPropagation(); deleteItemFromDropdown('${escapeJs(category)}', ${index}, '${mode}')">✕</button>
									</div>
								` : ''}
							</div>
						`).join('') : '<div class="dropdown-empty">Keine Einträge vorhanden.</div>'}
					</div>
				</div>
			`;
		}

		function toggleDropdown(button) {
			const current = button.closest(".custom-dropdown");
			const isOpen = current.classList.contains("open");

			closeAllDropdowns();

			if (!isOpen) {
				current.classList.add("open");
			}
		}

		function closeAllDropdowns() {
			document.querySelectorAll(".custom-dropdown").forEach(dropdown => {
				dropdown.classList.remove("open");
			});
		}

		function selectDropdownItem(category, index, mode) {
			if (mode === "input") {
				setSelectedIndex(category, String(index));
				renderInputView();
			} else {
				setSelectChoice(category, String(index));
				renderSelectView();
				updateSummary();
			}
			closeAllDropdowns();
		}

		function editItemFromDropdown(category, index, mode) {
			const currentValue = data[category][index];
			const newValue = prompt("Eintrag bearbeiten:", currentValue);

			if (newValue === null) return;

			const trimmed = newValue.trim();
			if (!trimmed) {
				alert("Der Eintrag darf nicht leer sein.");
				return;
			}

			data[category][index] = trimmed;
			saveAll();

			if (mode === "input") {
				setSelectedIndex(category, String(index));
				renderInputView();
			} else {
				setSelectChoice(category, String(index));
				renderSelectView();
				updateSummary();
			}
		}

		function deleteItemFromDropdown(category, index, mode) {
			const selectedInput = getSelectedIndex(category);
			const selectedSelect = getSelectChoice(category);

			data[category].splice(index, 1);

			fixSelectionAfterDelete(category, index, selectedInput, "input");
			fixSelectionAfterDelete(category, index, selectedSelect, "select");

			saveAll();

			if (mode === "input") {
				renderInputView();
			} else {
				renderSelectView();
				updateSummary();
			}
		}

		function fixSelectionAfterDelete(category, deletedIndex, selectedIndex, mode) {
			if (selectedIndex === '') return;

			const current = Number(selectedIndex);
			const deleted = Number(deletedIndex);

			if (current === deleted) {
				if (mode === "input") setSelectedIndex(category, '');
				if (mode === "select") setSelectChoice(category, '');
				return;
			}

			if (current > deleted) {
				if (mode === "input") setSelectedIndex(category, String(current - 1));
				if (mode === "select") setSelectChoice(category, String(current - 1));
			}
		}

		function addBulkItems() {
			if (!bulkInput.value.trim() || !bulkCategorySelector.value) {
				alert("Bitte alles ausfüllen.");
				return;
			}

			const lines = bulkInput.value
				.split(/\r?\n/)
				.map(l => l.trim())
				.filter(Boolean);

			if (!lines.length) return;

			data[bulkCategorySelector.value].push(...lines);
			saveAll();
			bulkInput.value = "";
			renderInputView();

			if (document.getElementById("selectView").classList.contains("active")) {
				renderSelectView();
			}
		}

		function formatWithTabDash(lines) {
			return lines.map(line => `\t- ${line}`).join("\n");
		}

		function updateSummary() {
			const selected = [];

			categories.forEach(cat => {
				const selectedIndex = getSelectChoice(cat);
				if (selectedIndex !== '' && data[cat][selectedIndex]) {
					selected.push(data[cat][selectedIndex]);
				}

				const manualValue = getManualCategoryText(cat).trim();
				if (manualValue) {
					selected.push(manualValue);
				}
			});

			selectedText.value = selected.length ? formatWithTabDash(selected) : "";
		}

		function copySummary() {
			const selected = selectedText.value.trimEnd();

			const manualLines = manualText.value
				.split(/\r?\n/)
				.map(l => l.trim())
				.filter(Boolean);

			const formattedManual = manualLines.length ? formatWithTabDash(manualLines) : "";
			const merged = [selected, formattedManual].filter(Boolean).join("\n");

			navigator.clipboard.writeText(merged).then(() => {
				showSplash("Text kopiert 👍");
			});
		}

		function resetSummary() {
			categories.forEach(cat => {
				setSelectChoice(cat, '');
				setManualCategoryText(cat, '');
			});
			selectedText.value = "";
			manualText.value = "";
			renderSelectView();
		}

		function showSplash(message) {
			const splash = document.createElement("div");
			splash.className = "splash-message";
			splash.innerText = message;
			document.body.appendChild(splash);

			setTimeout(() => {
				splash.classList.add("fade-out");
				splash.addEventListener("transitionend", () => splash.remove(), { once: true });
			}, 2000);
		}

		function saveAll() {
			localStorage.setItem("checklistData", JSON.stringify(data));
		}

		function getSelectedIndex(category) {
			return localStorage.getItem(`inputSelected:${category}`) ?? '';
		}

		function setSelectedIndex(category, index) {
			localStorage.setItem(`inputSelected:${category}`, index);
		}

		function getSelectChoice(category) {
			return localStorage.getItem(`selectChoice:${category}`) ?? '';
		}

		function setSelectChoice(category, index) {
			localStorage.setItem(`selectChoice:${category}`, index);
		}

		function getManualCategoryText(category) {
			return localStorage.getItem(`manualCat:${category}`) ?? '';
		}

		function setManualCategoryText(category, value) {
			localStorage.setItem(`manualCat:${category}`, value);
		}

		function cssId(text) {
			return text.replace(/\s+/g, "-").replace(/[^\w-]/g, "");
		}

		function escapeHtml(text) {
			const div = document.createElement("div");
			div.textContent = text ?? "";
			return div.innerHTML;
		}

		function escapeAttribute(text) {
			return String(text ?? "")
				.replace(/&/g, "&amp;")
				.replace(/"/g, "&quot;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;");
		}

		function escapeJs(text) {
			return String(text ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
		}

		document.addEventListener("click", function(event) {
			document.querySelectorAll(".custom-dropdown").forEach(dropdown => {
				if (!dropdown.contains(event.target)) {
					dropdown.classList.remove("open");
				}
			});
		});

		renderCategorySelector();
		renderInputView();
	</script>
</body>

</html>
