<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Prüfvermerk</title>
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect x=%228%22 y=%228%22 width=%2248%22 height=%2248%22 rx=%2210%22 fill=%22%23ffffff%22 stroke=%22%23d0d0d0%22 stroke-width=%222%22/><line x1=%2216%22 y1=%2220%22 x2=%2248%22 y2=%2220%22 stroke=%22%23909090%22 stroke-width=%222.5%22 stroke-linecap=%22round%22/><line x1=%2216%22 y1=%2230%22 x2=%2248%22 y2=%2230%22 stroke=%22%23909090%22 stroke-width=%222.5%22 stroke-linecap=%22round%22/><line x1=%2216%22 y1=%2240%22 x2=%2236%22 y2=%2240%22 stroke=%22%23909090%22 stroke-width=%222.5%22 stroke-linecap=%22round%22/></svg>">
	<style>
		@font-face {
			font-family: "BerlinTypeOffice";
			src: url("https://raw.githubusercontent.com/TurkazTuran/web/main/fonts/BerlinTypeOffice-Regular.ttf") format("truetype");
			font-weight: 400;
			font-style: normal;
		}

		@font-face {
			font-family: "BerlinTypeOffice";
			src: url("https://raw.githubusercontent.com/TurkazTuran/web/main/fonts/BerlinTypeOffice-Bold.ttf") format("truetype");
			font-weight: 700;
			font-style: normal;
		}

		:root {
			--bg: #eff2f8ff;
			--surface: #e3ebecff;
			--surface-2: #d7e4f3ff;
			--border: #545d68ff;
			--text: #16202a;
			--muted: #66758a;
			--accent: #c50fadff;
			--accent-2: #702f60ff;
			--danger: #dc2626;
			--danger-bg: #fef2f2;
			--success: #059669;
			--header-bg: #eef3f9;
			--shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
			--shadow-soft: 0 4px 14px rgba(15, 23, 42, 0.06);
			--radius: 16px;
			--radius-sm: 12px;
			--bar-size: 4px;
		}

		body.dark {
			--bg: #0f172a;
			--surface: #111827;
			--surface-2: #172033;
			--border: #25324a;
			--text: #e5edf8;
			--muted: #95a4bd;
			--accent: #60a5fa;
			--accent-2: #3b82f6;
			--danger: #f87171;
			--danger-bg: #2b1720;
			--success: #34d399;
			--header-bg: #182235;
			--shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
			--shadow-soft: 0 4px 14px rgba(0, 0, 0, 0.25);
		}

		* {
			box-sizing: border-box;
			font-family: "BerlinTypeOffice", "Berlin Type Office", Arial, sans-serif;
		}

		html, body {
			margin: 0;
			padding: 0;
		}

		body {
			font-family: "BerlinTypeOffice", "Berlin Type Office", Arial, sans-serif;
			background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 88%, #ffffff 12%) 100%);
			color: var(--text);
			font-size: 12px;
			padding: 18px;
			transition: background .25s ease, color .25s ease;
		}

		.app-shell {
			max-width: 1500px;
			margin: 0 auto;
		}

		.topbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 18px;
			flex-wrap: wrap;
		}

		.title-wrap h2 {
			margin: 0;
			font-size: 24px;
			font-weight: 800;
			letter-spacing: -0.02em;
		}

		.toolbar {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			align-items: center;
		}

		button,
		input,
		select,
		textarea {
			font: inherit;
			font-family: "BerlinTypeOffice", "Berlin Type Office", Arial, sans-serif;
			border-radius: 12px;
			border: 1px solid var(--border);
			background: var(--surface);
			color: var(--text);
			padding: 10px 12px;
			transition: all .2s ease;
		}

		input::placeholder,
		textarea::placeholder {
			color: var(--muted);
		}

		input:focus,
		select:focus,
		textarea:focus,
		button:focus {
			outline: none;
			border-color: var(--accent);
			box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
		}

		button {
			cursor: pointer;
			background: var(--surface);
			box-shadow: var(--shadow-soft);
			font-weight: 600;
		}

		button:hover {
			transform: translateY(-1px);
			border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
		}

		button.primary {
			background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
			color: #fff;
			border-color: transparent;
		}

		button.primary:hover {
			filter: brightness(1.03);
		}

		button.ghost {
			background: transparent;
			box-shadow: none;
		}

		button.delete {
			color: var(--danger);
			background: var(--danger-bg);
			border-color: color-mix(in srgb, var(--danger) 25%, var(--border));
			padding: 7px 10px;
			min-width: 38px;
		}

		button.edit,
		button.move {
			padding: 7px 10px;
			min-width: 38px;
		}

		.toggle-theme {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 10px 14px;
		}

		.tab-btn {
			padding: 11px 16px;
			border-radius: 999px;
			background: var(--surface);
		}

		.tab-btn.active {
			background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
			color: #fff;
			border-color: transparent;
		}

		.view { display: none; }
		.view.active { display: block; }

		.card {
			background: color-mix(in srgb, var(--surface) 92%, transparent);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
		}

		.bulk-panel {
			display: grid;
			gap: 10px;
			margin-bottom: 18px;
			padding: 16px;
		}

		.bulk-actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			align-items: center;
		}

		.bulk-actions select {
			min-width: 260px;
			flex: 1;
		}

		.section-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 16px;
		}

		.section {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			overflow: visible;
			box-shadow: var(--shadow-soft);
		}

		.section-title {
			padding: 10px 16px;
			background: #a7afbd;
			border-bottom: 1px solid #0b0e93;
			font-weight: 700;
			letter-spacing: -.01em;
			border-radius: var(--radius) var(--radius) 0 0;
		}

		.section-body {
			padding: 12px;
			display: grid;
			gap: 10px;
			position: relative;
		}

		.summary {
			margin-top: 18px;
			padding: 16px;
		}

		.summary-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 14px;
		}

		.summary h3 {
			margin: 0 0 8px;
			font-size: 14px;
			font-weight: 700;
		}

		textarea {
			width: 100%;
			min-height: 150px;
			resize: vertical;
		}

		.summary-actions {
			margin-top: 12px;
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.import-input {
			display: none;
		}

		.custom-dropdown {
			position: relative;
		}

		.dropdown-trigger {
			width: 100%;
			text-align: left;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			min-height: 40px;
			padding: 8px 10px;
			font-size: 13px;
			background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
			border: 1px solid var(--border);
			border-left: var(--bar-size) solid var(--accent);
			box-shadow: none;
		}

		.dropdown-trigger-text {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			font-weight: 500;
		}

		.dropdown-trigger-arrow {
			color: var(--muted);
			font-size: 18px;
		}

		.dropdown-menu {
			display: none;
			position: absolute;
			top: calc(100% + 8px);
			left: 0;
			right: 0;
			background: var(--surface);
			border: 1px solid var(--border);
			box-shadow: var(--shadow);
			border-radius: 14px;
			z-index: 3000;
			max-height: 320px;
			overflow: hidden;
		}

		.custom-dropdown.open .dropdown-menu {
			display: block;
		}

		.dropdown-search {
			padding: 8px;
			border-bottom: 1px solid var(--border);
			background: var(--surface-2);
		}

		.dropdown-search input {
			width: 100%;
			padding: 7px 9px;
			font-size: 13px;
		}

		.dropdown-list {
			max-height: 250px;
			overflow-y: auto;
		}

		.dropdown-empty {
			padding: 12px;
			color: var(--muted);
			font-size: 13px;
		}

		.dropdown-item {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
			align-items: center;
			padding: 2px 4px;
			border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
		}

		.dropdown-item:last-child {
			border-bottom: none;
		}

		.dropdown-item.no-actions {
			grid-template-columns: 1fr;
		}

		.dropdown-item.selected {
			background: color-mix(in srgb, var(--accent) 10%, var(--surface));
		}

		.dropdown-label {
			min-width: 0;
			padding: 7px 10px;
			border-radius: 12px;
			background: var(--surface-2);
			border-left: var(--bar-size) solid color-mix(in srgb, var(--accent) 60%, #64748b);
			cursor: pointer;
			word-break: break-word;
			line-height: 1.25;
			font-size: 13px;
		}

		.dropdown-label:hover {
			background: color-mix(in srgb, var(--accent) 8%, var(--surface-2));
		}

		.dropdown-actions {
			display: flex;
			gap: 6px;
			flex-wrap: wrap;
			align-items: center;
		}

		.manual-input {
			width: 100%;
		}

		#selectView .section-title {
			font-size: 14px;
		}

		#selectView .dropdown-trigger,
		#selectView .dropdown-label,
		#selectView .manual-input {
			font-size: 12px;
		}

		.toast {
			position: fixed;
			right: 20px;
			bottom: 20px;
			background: rgba(15, 23, 42, 0.92);
			color: #fff;
			padding: 14px 18px;
			border-radius: 14px;
			box-shadow: var(--shadow);
			z-index: 9999;
			opacity: 0;
			transform: translateY(10px);
			transition: all .25s ease;
			pointer-events: none;
		}

		.toast.show {
			opacity: 1;
			transform: translateY(0);
		}

		.result-output {
			width: 100%;
			min-height: 150px;
			border: 1px solid var(--border);
			border-radius: 12px;
			background: var(--surface);
			padding: 14px;
			line-height: 1.7;
			font-size: 14px;
			font-family: "BerlinTypeOffice", "Berlin Type Office", Arial, sans-serif;
		}

		.copy-source {
			position: fixed;
			left: -99999px;
			top: 0;
			opacity: 0;
			pointer-events: none;
			white-space: normal;
		}

		@media (max-width: 1100px) {
			.section-grid {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}
		}

		@media (max-width: 760px) {
			body {
				padding: 16px;
			}

			.section-grid,
			.summary-grid {
				grid-template-columns: 1fr;
			}

			.bulk-actions {
				flex-direction: column;
				align-items: stretch;
			}

			.bulk-actions select,
			.bulk-actions button {
				width: 100%;
			}

			.toolbar {
				width: 100%;
			}
		}

		.toolbar button {
			padding: 10px 14px;
			border-radius: 999px;
			background: var(--surface);
			border: 1px solid var(--border);
			box-shadow: var(--shadow-soft);
			font-weight: 600;
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}

		.toolbar button:hover {
			transform: translateY(-1px);
			border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
		}

		.toolbar .tab-btn.active {
			background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
			color: #fff;
			border-color: transparent;
		}

		.toolbar .ghost {
			background: transparent;
			box-shadow: none;
			border: 1px solid var(--border);
		}

		.toolbar .toggle-theme {
			padding: 10px 14px;
			border-radius: 999px;
		}
	</style>
</head>

<body>
	<div class="app-shell">
		<div class="topbar">
			<div class="title-wrap">
				<h2>Prüfvermerk</h2>
			</div>

			<div class="toolbar">
				<button class="tab-btn active" onclick="showView('inputView', this)">Werte eingeben</button>
				<button class="tab-btn" onclick="showView('selectView', this)">Auswahlliste</button>
				<button class="toggle-theme" onclick="toggleTheme()">🌙 / ☀️ Theme</button>
				<button onclick="exportData()">Export Listenwerte</button>
				<button onclick="document.getElementById('importFile').click()">Import Listenwerte</button>
				<button class="ghost" onclick="resetAllData()">Alles löschen</button>
				<input class="import-input" id="importFile" type="file" accept=".json,application/json" onchange="importData(event)">
			</div>
		</div>

		<div id="inputView" class="view active">
			<div class="bulk-panel card">
				<textarea id="bulkInput" rows="4" placeholder="Mehrere Zeilen einfügen – jede Zeile wird als eigener Wert gespeichert"></textarea>
				<div class="bulk-actions">
					<select id="bulkCategorySelector"></select>
					<button class="primary" onclick="addBulkItems()">Werte hinzufügen</button>
				</div>
			</div>

			<div id="inputListGrid" class="section-grid"></div>
		</div>

		<div id="selectView" class="view">
			<div class="section-grid" id="selectGrid"></div>

			<div class="summary card">
				<div class="summary-grid">
					<div class="summary-col">
						<h3>Ausgewählte Werte</h3>
						<div id="selectedText" class="result-output"></div>
					</div>

					<div class="summary-col">
						<h3>Manuelle Eingabe</h3>
						<textarea id="manualText" placeholder="Zusätzliche eigene Texte..."></textarea>
					</div>
				</div>

				<div class="summary-actions">
					<button class="primary" onclick="copySummary()">Texte kopieren</button>
					<button onclick="resetSummary()">Auswahl zurücksetzen</button>
				</div>
			</div>
		</div>
	</div>

	<div id="toast" class="toast"></div>
	<div id="copySource" class="copy-source" contenteditable="true"></div>

	<script>
		const FONT_STACK = `'BerlinTypeOffice','Berlin Type Office',Arial,sans-serif`;

		const categories = [
			"Aktueller Status",
			"Beantragt",
			"Zeitliche Voraussetzung",
			"Lebensunterhalt",
			"Rentenversicherung",
			"Sicherheit",
			"Sprachkenntnisse",
			"Rechts- und Gesellschaftsordnung",
			"Erteilung"
		];

		let data = JSON.parse(localStorage.getItem("checklistData")) || {};
		categories.forEach(c => data[c] ||= []);

		const bulkInput = document.getElementById("bulkInput");
		const bulkCategorySelector = document.getElementById("bulkCategorySelector");
		const inputListGrid = document.getElementById("inputListGrid");
		const selectGrid = document.getElementById("selectGrid");
		const selectedText = document.getElementById("selectedText");
		const manualText = document.getElementById("manualText");
		const toast = document.getElementById("toast");
		const copySource = document.getElementById("copySource");

		function initTheme() {
			const saved = localStorage.getItem("themeMode") || "light";
			document.body.classList.toggle("dark", saved === "dark");
		}

		function toggleTheme() {
			const dark = document.body.classList.toggle("dark");
			localStorage.setItem("themeMode", dark ? "dark" : "light");
		}

		function showView(id, btn) {
			document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
			document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
			document.getElementById(id).classList.add("active");
			btn.classList.add("active");
			closeAllDropdowns();

			if (id === "inputView") renderInputView();
			if (id === "selectView") renderSelectView();
		}

		function renderCategorySelector() {
			bulkCategorySelector.innerHTML = '<option value="">Kategorie auswählen</option>';
			categories.forEach(cat => {
				const o = document.createElement("option");
				o.value = cat;
				o.textContent = cat;
				bulkCategorySelector.appendChild(o);
			});
		}

		function renderInputView() {
			inputListGrid.innerHTML = "";
			categories.forEach(cat => {
				const sec = document.createElement("div");
				sec.className = "section";
				sec.innerHTML = `
					<div class="section-title">${escapeHtml(cat)}</div>
					<div class="section-body">
						${renderCustomDropdown(cat, "input")}
					</div>
				`;
				inputListGrid.appendChild(sec);
			});
		}

		function renderSelectView() {
			selectGrid.innerHTML = "";
			categories.forEach(cat => {
				const sec = document.createElement("div");
				sec.className = "section";
				sec.innerHTML = `
					<div class="section-title">${escapeHtml(cat)}</div>
					<div class="section-body">
						${renderCustomDropdown(cat, "select")}
						<input
							class="manual-input"
							type="text"
							placeholder="Manuelle Eingabe für ${escapeHtml(cat)}..."
							data-manual-cat="${cssId(cat)}"
							value="${escapeAttribute(getManualCategoryText(cat))}"
							oninput="setManualCategoryText('${escapeJs(cat)}', this.value); updateSummary();">
					</div>
				`;
				selectGrid.appendChild(sec);
			});
			updateSummary();
		}

		function renderCustomDropdown(category, mode) {
			const selectedIndex = mode === "input" ? getSelectedIndex(category) : getSelectChoice(category);
			const selectedValue = selectedIndex !== '' && data[category][selectedIndex]
				? data[category][selectedIndex]
				: "Bitte auswählen";

			const withActions = mode === "input";
			const searchValue = getDropdownSearch(category, mode);
			const filteredItems = data[category]
				.map((value, index) => ({ value, index }))
				.filter(item => item.value.toLowerCase().includes(searchValue.toLowerCase()));

			return `
				<div class="custom-dropdown" data-category="${escapeAttribute(category)}" data-mode="${mode}">
					<button type="button" class="dropdown-trigger" onclick="toggleDropdown(this)">
						<span class="dropdown-trigger-text">${escapeHtml(selectedValue)}</span>
						<span class="dropdown-trigger-arrow">▼</span>
					</button>

					<div class="dropdown-menu">
						<div class="dropdown-search">
							<input
								type="text"
								placeholder="Suchen..."
								value="${escapeAttribute(searchValue)}"
								onclick="event.stopPropagation()"
								oninput="setDropdownSearch('${escapeJs(category)}', '${mode}', this.value); rerenderCurrentViewKeepDropdown('${escapeJs(category)}', '${mode}')">
						</div>

						<div class="dropdown-list">
							${filteredItems.length ? filteredItems.map(item => `
								<div class="dropdown-item ${String(selectedIndex) === String(item.index) ? 'selected' : ''} ${withActions ? '' : 'no-actions'}">
									<div class="dropdown-label" onclick="selectDropdownItem('${escapeJs(category)}', ${item.index}, '${mode}')">
										${escapeHtml(item.value)}
									</div>
									${withActions ? `
										<div class="dropdown-actions">
											<button type="button" class="move" title="Nach oben"
												onclick="event.stopPropagation(); moveItem('${escapeJs(category)}', ${item.index}, -1)">⬆️</button>
											<button type="button" class="move" title="Nach unten"
												onclick="event.stopPropagation(); moveItem('${escapeJs(category)}', ${item.index}, 1)">⬇️</button>
											<button type="button" class="edit" title="Bearbeiten"
												onclick="event.stopPropagation(); editItemFromDropdown('${escapeJs(category)}', ${item.index}, '${mode}')">✏️</button>
											<button type="button" class="delete" title="Löschen"
												onclick="event.stopPropagation(); deleteItemFromDropdown('${escapeJs(category)}', ${item.index}, '${mode}')">❌</button>
										</div>
									` : ''}
								</div>
							`).join("") : '<div class="dropdown-empty">Keine passenden Einträge gefunden.</div>'}
						</div>
					</div>
				</div>
			`;
		}

		function rerenderCurrentViewKeepDropdown(category, mode) {
			if (mode === "input") {
				renderInputView();
			} else {
				renderSelectView();
			}

			requestAnimationFrame(() => {
				document.querySelectorAll(".custom-dropdown").forEach(dd => {
					const cat = dd.getAttribute("data-category");
					const md = dd.getAttribute("data-mode");
					if (cat === category && md === mode) {
						dd.classList.add("open");
						const input = dd.querySelector(".dropdown-search input");
						if (input) {
							input.focus();
							input.setSelectionRange(input.value.length, input.value.length);
						}
					}
				});
			});
		}

		function toggleDropdown(button) {
			const current = button.closest(".custom-dropdown");
			const isOpen = current.classList.contains("open");
			closeAllDropdowns();
			if (!isOpen) {
				current.classList.add("open");
				const search = current.querySelector(".dropdown-search input");
				if (search) setTimeout(() => search.focus(), 0);
			}
		}

		function closeAllDropdowns() {
			document.querySelectorAll(".custom-dropdown").forEach(dropdown => {
				dropdown.classList.remove("open");
			});
		}

		function selectDropdownItem(category, index, mode) {
			if (mode === "input") {
				setSelectedIndex(category, String(index));
				renderInputView();
			} else {
				setSelectChoice(category, String(index));
				renderSelectView();
				updateSummary();
			}
			closeAllDropdowns();
		}

		function editItemFromDropdown(category, index, mode) {
			const currentValue = data[category][index];
			const newValue = prompt("Eintrag bearbeiten:", currentValue);
			if (newValue === null) return;

			const trimmed = newValue.trim();
			if (!trimmed) {
				alert("Der Eintrag darf nicht leer sein.");
				return;
			}

			data[category][index] = trimmed;
			saveAll();

			if (mode === "input") {
				setSelectedIndex(category, String(index));
				renderInputView();
			} else {
				setSelectChoice(category, String(index));
				renderSelectView();
				updateSummary();
			}

			closeAllDropdowns();
			showToast("Eintrag bearbeitet");
		}

		function deleteItemFromDropdown(category, index, mode) {
			const value = data[category][index];
			const ok = confirm(`Diesen Eintrag wirklich löschen?\n\n${value}`);
			if (!ok) return;

			const selectedInput = getSelectedIndex(category);
			const selectedSelect = getSelectChoice(category);

			data[category].splice(index, 1);

			fixSelectionAfterDelete(category, index, selectedInput, "input");
			fixSelectionAfterDelete(category, index, selectedSelect, "select");

			saveAll();

			if (mode === "input") {
				renderInputView();
			} else {
				renderSelectView();
				updateSummary();
			}

			closeAllDropdowns();
			showToast("Eintrag gelöscht");
		}

		function moveItem(category, index, direction) {
			const newIndex = index + direction;
			if (newIndex < 0 || newIndex >= data[category].length) return;

			const arr = data[category];
			[arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];

			shiftSelectionOnMove(category, index, newIndex, "input");
			shiftSelectionOnMove(category, index, newIndex, "select");

			saveAll();
			renderInputView();

			if (document.getElementById("selectView").classList.contains("active")) {
				renderSelectView();
			}

			showToast("Reihenfolge geändert");
		}

		function shiftSelectionOnMove(category, oldIndex, newIndex, mode) {
			const current = mode === "input" ? getSelectedIndex(category) : getSelectChoice(category);
			if (current === '') return;
			const currentNum = Number(current);

			if (currentNum === oldIndex) {
				if (mode === "input") setSelectedIndex(category, String(newIndex));
				if (mode === "select") setSelectChoice(category, String(newIndex));
			} else if (currentNum === newIndex) {
				if (mode === "input") setSelectedIndex(category, String(oldIndex));
				if (mode === "select") setSelectChoice(category, String(oldIndex));
			}
		}

		function fixSelectionAfterDelete(category, deletedIndex, selectedIndex, mode) {
			if (selectedIndex === '') return;
			const current = Number(selectedIndex);
			const deleted = Number(deletedIndex);

			if (current === deleted) {
				if (mode === "input") setSelectedIndex(category, '');
				if (mode === "select") setSelectChoice(category, '');
				return;
			}

			if (current > deleted) {
				if (mode === "input") setSelectedIndex(category, String(current - 1));
				if (mode === "select") setSelectChoice(category, String(current - 1));
			}
		}

		function addBulkItems() {
			if (!bulkInput.value.trim() || !bulkCategorySelector.value) {
				alert("Bitte alles ausfüllen.");
				return;
			}

			const lines = bulkInput.value
				.split(/\r?\n/)
				.map(l => l.trim())
				.filter(Boolean);

			if (!lines.length) return;

			data[bulkCategorySelector.value].push(...lines);
			saveAll();
			bulkInput.value = "";
			renderInputView();

			if (document.getElementById("selectView").classList.contains("active")) {
				renderSelectView();
			}

			showToast(`${lines.length} Wert(e) hinzugefügt`);
		}

		function getSelectedCategoryValue(category) {
			const selectedIndex = getSelectChoice(category);
			if (selectedIndex !== '' && data[category][selectedIndex]) {
				return data[category][selectedIndex];
			}

			const manualValue = getManualCategoryText(category).trim();
			return manualValue || "";
		}

		function updateSummary() {
			selectedText.innerHTML = buildFormattedHtml(false);
		}

		function buildFormattedHtml(forClipboard = false) {
			const aktuellerStatus = getSelectedCategoryValue("Aktueller Status");
			const beantragt = getSelectedCategoryValue("Beantragt");
			const zeitlicheVoraussetzung = getSelectedCategoryValue("Zeitliche Voraussetzung");
			const lebensunterhalt = getSelectedCategoryValue("Lebensunterhalt");
			const rentenversicherung = getSelectedCategoryValue("Rentenversicherung");
			const sicherheit = getSelectedCategoryValue("Sicherheit");
			const sprachkenntnisse = getSelectedCategoryValue("Sprachkenntnisse");
			const rechtsordnung = getSelectedCategoryValue("Rechts- und Gesellschaftsordnung");
			const erteilung = getSelectedCategoryValue("Erteilung");

			const bulletItems = [
				zeitlicheVoraussetzung,
				lebensunterhalt,
				rentenversicherung,
				sicherheit,
				sprachkenntnisse,
				rechtsordnung
			].filter(Boolean);

			const manualLines = manualText.value
				.split(/\r?\n/)
				.map(l => l.trim())
				.filter(Boolean);

			const lineStyle = forClipboard
				? `font-family:${FONT_STACK};font-size:12pt;line-height:1.5;`
				: `font-family:${FONT_STACK};font-size:16px;line-height:1.7;`;

			const labelStyle = `${lineStyle}font-weight:400;`;
			const blueStyle = `${lineStyle}color:#0b66d6;font-weight:700;`;
			const orangeStyle = `${lineStyle}color:#e46c0a;font-weight:700;`;
			const greenStyle = `${lineStyle}color:#00a651;font-weight:700;`;

			let html = `<div style="${lineStyle}color:${forClipboard ? "#000000" : "inherit"};">`;

			if (aktuellerStatus) {
				html += `
					<div style="margin:0 0 8px 0;${lineStyle}">
						<span style="${labelStyle}">Aktueller Status: </span>
						<span style="${blueStyle}">${escapeHtml(aktuellerStatus)}</span>
					</div><div></div> 
				`;
			}

			if (beantragt) {
				html += `
					<div style="margin:0 0 8px 0;${lineStyle}">
						<span style="${labelStyle}">Beantragt: </span>
						<span style="${orangeStyle}">${escapeHtml(beantragt)}</span>
					</div><div></div>
				`;
			}

			if (bulletItems.length) {
	html += `<div style="height:12px;"></div>`;
	bulletItems.forEach(item => {
		html += `<div style="margin:0 0 8px 0;${lineStyle}">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;✅&nbsp;&nbsp;&nbsp;${escapeHtml(item)}</div><div></div>`;
	});
}

			if (erteilung) {
				html += `<div style="height:12px;"></div>`;
				html += `
					<div style="margin:0;${lineStyle}">
						<span style="${labelStyle}">Erteilung: </span>
						<span style="${greenStyle}">${escapeHtml(erteilung)}</span>
					</div>
				`;
			}

			if (manualLines.length) {
				html += `<div style="height:12px;"></div>`;
				manualLines.forEach(line => {
					html += `<div style="margin:0 0 8px 0;${lineStyle}">- ${escapeHtml(line)}</div>`;
				});
			}

			html += `</div>`;
			return html;
		}

		function buildPlainText() {
			const lines = [];

			const aktuellerStatus = getSelectedCategoryValue("Aktueller Status");
			const beantragt = getSelectedCategoryValue("Beantragt");
			const zeitlicheVoraussetzung = getSelectedCategoryValue("Zeitliche Voraussetzung");
			const lebensunterhalt = getSelectedCategoryValue("Lebensunterhalt");
			const rentenversicherung = getSelectedCategoryValue("Rentenversicherung");
			const sicherheit = getSelectedCategoryValue("Sicherheit");
			const sprachkenntnisse = getSelectedCategoryValue("Sprachkenntnisse");
			const rechtsordnung = getSelectedCategoryValue("Rechts- und Gesellschaftsordnung");
			const erteilung = getSelectedCategoryValue("Erteilung");

			const bulletItems = [
				zeitlicheVoraussetzung,
				lebensunterhalt,
				rentenversicherung,
				sicherheit,
				sprachkenntnisse,
				rechtsordnung
			].filter(Boolean);

			const manualLines = manualText.value
				.split(/\r?\n/)
				.map(l => l.trim())
				.filter(Boolean);

			if (aktuellerStatus) lines.push(`Aktueller Status: ${aktuellerStatus}`);
			if (beantragt) lines.push(`Beantragt: ${beantragt}`);

			if (bulletItems.length) {
				lines.push("");
				bulletItems.forEach(item => lines.push(`- ${item}`));
			}

			if (erteilung) {
				lines.push("");
				lines.push(`Erteilung: ${erteilung}`);
			}

			if (manualLines.length) {
				lines.push("");
				manualLines.forEach(line => lines.push(`- ${line}`));
			}

			return lines.join("\n");
		}

		async function copySummary() {
			const htmlContent = buildFormattedHtml(true);
			const textContent = buildPlainText();

			copySource.innerHTML = htmlContent;

			let copied = false;

			try {
				const selection = window.getSelection();
				const range = document.createRange();
				range.selectNodeContents(copySource);

				selection.removeAllRanges();
				selection.addRange(range);

				copied = document.execCommand("copy");
				selection.removeAllRanges();
			} catch (e) {
				copied = false;
			}

			if (!copied && navigator.clipboard && window.ClipboardItem) {
				try {
					await navigator.clipboard.write([
						new ClipboardItem({
							"text/html": new Blob([htmlContent], { type: "text/html" }),
							"text/plain": new Blob([textContent], { type: "text/plain" })
						})
					]);
					copied = true;
				} catch (e) {
					copied = false;
				}
			}

			if (!copied) {
				try {
					await navigator.clipboard.writeText(textContent);
					showToast("Nur Text kopiert");
					return;
				} catch (e) {
					alert("Kopieren fehlgeschlagen.");
					return;
				}
			}

			showToast("Formatierter Text kopiert");
		}

		function resetSummary() {
			categories.forEach(cat => {
				setSelectChoice(cat, '');
				setManualCategoryText(cat, '');
			});
			selectedText.innerHTML = "";
			manualText.value = "";
			renderSelectView();
			showToast("Auswahl zurückgesetzt");
		}

		function exportData() {
			const payload = {
				version: 11,
				exported_at: new Date().toISOString(),
				data,
				theme: localStorage.getItem("themeMode") || "light"
			};

			const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
			const url = URL.createObjectURL(blob);
			const a = document.createElement("a");
			a.href = url;
			a.download = "pruefvermerk-generator-v11-export.json";
			document.body.appendChild(a);
			a.click();
			a.remove();
			URL.revokeObjectURL(url);
			showToast("Export erstellt");
		}

		function importData(event) {
			const file = event.target.files?.[0];
			if (!file) return;

			const reader = new FileReader();
			reader.onload = e => {
				try {
					const parsed = JSON.parse(e.target.result);
					const importedData = parsed.data ?? parsed;

					categories.forEach(cat => {
						data[cat] = Array.isArray(importedData[cat]) ? importedData[cat] : [];
					});

					saveAll();
					renderInputView();
					if (document.getElementById("selectView").classList.contains("active")) {
						renderSelectView();
					}
					showToast("Import erfolgreich");
				} catch (err) {
					alert("Import fehlgeschlagen. Bitte gültige JSON-Datei wählen.");
				} finally {
					event.target.value = "";
				}
			};
			reader.readAsText(file);
		}

		function resetAllData() {
			const ok = confirm("Wirklich alle gespeicherten Daten löschen?");
			if (!ok) return;

			categories.forEach(cat => {
				data[cat] = [];
				localStorage.removeItem(`inputSelected:${cat}`);
				localStorage.removeItem(`selectChoice:${cat}`);
				localStorage.removeItem(`manualCat:${cat}`);
				localStorage.removeItem(`dropdownSearch:input:${cat}`);
				localStorage.removeItem(`dropdownSearch:select:${cat}`);
			});

			saveAll();
			selectedText.innerHTML = "";
			manualText.value = "";
			bulkInput.value = "";

			renderInputView();
			if (document.getElementById("selectView").classList.contains("active")) {
				renderSelectView();
			}

			showToast("Alle Daten gelöscht");
		}

		function showToast(message) {
			toast.textContent = message;
			toast.classList.add("show");
			clearTimeout(showToast._timer);
			showToast._timer = setTimeout(() => {
				toast.classList.remove("show");
			}, 1800);
		}

		function saveAll() {
			localStorage.setItem("checklistData", JSON.stringify(data));
		}

		function getSelectedIndex(category) {
			return localStorage.getItem(`inputSelected:${category}`) ?? '';
		}

		function setSelectedIndex(category, index) {
			localStorage.setItem(`inputSelected:${category}`, index);
		}

		function getSelectChoice(category) {
			return localStorage.getItem(`selectChoice:${category}`) ?? '';
		}

		function setSelectChoice(category, index) {
			localStorage.setItem(`selectChoice:${category}`, index);
		}

		function getManualCategoryText(category) {
			return localStorage.getItem(`manualCat:${category}`) ?? '';
		}

		function setManualCategoryText(category, value) {
			localStorage.setItem(`manualCat:${category}`, value);
		}

		function getDropdownSearch(category, mode) {
			return localStorage.getItem(`dropdownSearch:${mode}:${category}`) ?? '';
		}

		function setDropdownSearch(category, mode, value) {
			localStorage.setItem(`dropdownSearch:${mode}:${category}`, value);
		}

		function cssId(text) {
			return text.replace(/\s+/g, "-").replace(/[^\w-]/g, "");
		}

		function escapeHtml(text) {
			const div = document.createElement("div");
			div.textContent = String(text ?? "");
			return div.innerHTML;
		}

		function escapeAttribute(text) {
			return String(text ?? "")
				.replace(/&/g, "&amp;")
				.replace(/"/g, "&quot;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;");
		}

		function escapeJs(text) {
			return String(text ?? "")
				.replace(/\\/g, "\\\\")
				.replace(/'/g, "\\'");
		}

		document.addEventListener("click", function (event) {
			document.querySelectorAll(".custom-dropdown").forEach(dropdown => {
				if (!dropdown.contains(event.target)) {
					dropdown.classList.remove("open");
				}
			});
		});

		initTheme();
		renderCategorySelector();
		renderInputView();
	</script>
</body>
</html>
